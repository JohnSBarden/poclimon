name: Build Release Binaries

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  artifact: poclimon,     asset: poclimon-linux-x86_64       }
          - { name: macos-x86_64,   os: macos-13,        target: x86_64-apple-darwin,        artifact: poclimon,     asset: poclimon-macos-x86_64       }
          - { name: macos-arm64,    os: macos-latest,    target: aarch64-apple-darwin,       artifact: poclimon,     asset: poclimon-macos-arm64        }
          - { name: windows-x86_64, os: windows-latest,  target: x86_64-pc-windows-msvc,    artifact: poclimon.exe, asset: poclimon-windows-x86_64.exe }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
