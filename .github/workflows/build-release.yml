name: Build Release Binaries

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-ubuntu:
    name: Build — Ubuntu (linux + windows)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl-x86_64-pc-windows-gnu
      - name: Install musl-tools and mingw-w64
        run: sudo apt-get update && sudo apt-get install -y musl-tools mingw-w64
      - name: Build linux
        run: cargo build --release --locked --target x86_64-unknown-linux-musl
      - name: Build windows
        run: cargo build --release --locked --target x86_64-pc-windows-gnu
      - name: Stage binaries
        run: |
          cp target/x86_64-unknown-linux-musl/release/poclimon poclimon-linux-x86_64
          cp target/x86_64-pc-windows-gnu/release/poclimon.exe poclimon-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-ubuntu
          path: |
            poclimon-linux-x86_64
            poclimon-windows-x86_64.exe
          retention-days: 1

  build-macos:
    name: Build — macOS (arm64 + x86_64)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-apple-darwin-aarch64-apple-darwin
      - name: Build arm64
        run: cargo build --release --locked --target aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --locked --target x86_64-apple-darwin
      - name: Stage binaries
        run: |
          cp target/aarch64-apple-darwin/release/poclimon poclimon-macos-arm64
          cp target/x86_64-apple-darwin/release/poclimon poclimon-macos-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: |
            poclimon-macos-arm64
            poclimon-macos-x86_64
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [build-ubuntu, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
